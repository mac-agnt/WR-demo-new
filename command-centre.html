<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Command centre</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500&display=swap" rel="stylesheet" />

<!--
  ACMR COMMAND CENTRE  ·  reusable, config-driven dashboard shell. SF only. Monochrome + one rationed accent. No fake data.

  PASTE A SCOPE OF WORKS  →  set `brand` (company, owner, accent) and fill the `NAV` config with one entry per module,
                             then build each module under `PAGES` (or leave it to auto-scaffold the empty shell).
  ADD A MODULE            →  add one { id, label, icon } to `NAV`  (auto sidebar + palette + empty scaffold).
                             Optional: PAGES["id"] = () => `...`  composing KpiCard / StatCard / Panel / Table / BriefingCard.
  RESKIN FOR A CLIENT     →  change brand.accent and brand.accentDark. One line. Nothing else carries colour.

  Design values: structure, type and layout follow the build brief. Micro-values not pinned by a tokens doc use the
  premium monochrome defaults below (canvas, surfaces, hairlines, shadows, motion). Swap if a DESIGN.md supersedes them.
-->

<style>
/* ============================ DESIGN TOKENS ============================ */
:root,[data-theme="light"]{
  /* monochrome foundation (crisp warm near-white, not beige) */
  --bg:#F7F6F3;
  --surface:#FFFFFF;
  --surface-2:#FBFAF8;
  --hairline:rgba(20,19,15,0.07);
  --hairline-2:rgba(20,19,15,0.12);

  --ink:#1A1A17;
  --ink-2:#6B6A62;
  --ink-3:#9C9A90;

  /* the single rationed accent (1 to 2 uses per screen) */
  --accent:#356859;                 /* RESKIN LEVER */
  --accent-soft:rgba(53,104,89,0.10);

  --shadow-sm:0 1px 2px rgba(20,19,15,0.05);
  --shadow:0 1px 2px rgba(20,19,15,0.04), 0 8px 20px rgba(20,19,15,0.06);
  --shadow-lift:0 1px 2px rgba(20,19,15,0.05), 0 14px 30px rgba(20,19,15,0.10);

  --glass:rgba(255,255,255,0.80);   /* command palette ONLY */

  --radius:16px;
  --radius-ctrl:11px;
  --rail-w:64px;                    /* slim icon rail */
  --rail-x:248px;                   /* expanded on hover */
  --topbar-h:58px;
  --page-max:1200px;                /* standard centred column */
  --home-max:720px;                 /* assistant column */

  /* motion: gentle and quick, never bouncy */
  --ease:cubic-bezier(.22,1,.36,1);
  --dur:.22s;
  --dur-fast:.16s;
  --stagger:55ms;

  --font-sans:-apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", system-ui, sans-serif;
  --font-serif:'Newsreader', ui-serif, Georgia, "Times New Roman", serif;   /* greeting only */
  --note-bg:rgba(255,255,255,0.72);   /* Apple-style frosted notification */
}
[data-theme="dark"]{
  /* near-black canvas, elevation from borders + shadows */
  --bg:#121211;
  --surface:#1A1A18;
  --surface-2:#1F1E1B;
  --hairline:rgba(255,255,255,0.08);
  --hairline-2:rgba(255,255,255,0.14);

  --ink:#F2F0EA;
  --ink-2:#A8A599;
  --ink-3:#74726A;

  --accent:#5FB89B;                 /* brighter accent in dark */
  --accent-soft:rgba(95,184,155,0.14);

  --shadow-sm:0 1px 2px rgba(0,0,0,0.35);
  --shadow:0 1px 2px rgba(0,0,0,0.32), 0 8px 22px rgba(0,0,0,0.42);
  --shadow-lift:0 1px 2px rgba(0,0,0,0.35), 0 16px 34px rgba(0,0,0,0.52);

  --glass:rgba(28,27,24,0.82);
  --note-bg:rgba(40,38,33,0.58);
}

*{box-sizing:border-box}
html,body{margin:0;min-height:100%}
body{
  font-family:var(--font-sans);
  font-size:14px;color:var(--ink);background:var(--bg);
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;line-height:1.5;
}
button,input{font-family:inherit}
button{cursor:pointer;color:inherit;border:none;background:none;padding:0}
textarea{font-family:inherit}
::selection{background:var(--accent-soft);color:var(--ink)}
*{scrollbar-width:thin;scrollbar-color:var(--hairline-2) transparent}
*::-webkit-scrollbar{width:9px;height:9px}
*::-webkit-scrollbar-thumb{background:var(--hairline-2);border-radius:99px;border:2px solid transparent;background-clip:padding-box}
.ic{display:block;flex:none}
.eyebrow{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3)}
.muted{color:var(--ink-3)}

/* ============================ SIDEBAR (slim rail, hover to expand) ============================ */
.side{
  position:fixed;top:0;left:0;bottom:0;z-index:40;
  width:var(--rail-w);
  display:flex;flex-direction:column;
  padding:14px 8px;
  background:var(--bg);
  border-right:1px solid var(--hairline);
  overflow:hidden;
  transition:width var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
}
@media (hover:hover){ .side:hover{width:var(--rail-x);box-shadow:var(--shadow-lift)} }

.s-ic{width:48px;flex:none;display:grid;place-items:center}
.s-lbl{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;opacity:0;transition:opacity var(--dur-fast) var(--ease)}
.side:hover .s-lbl{opacity:1}

/* brand mark (monochrome) */
.brand{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;min-height:48px;margin-bottom:16px}
/* scale instead of height — GPU-composited, no layout reflow, no jitter */
.brand-logo{height:46px;width:auto;display:block;flex:none;transform:scale(0.478);transform-origin:center center;transition:transform .32s cubic-bezier(.34,1.2,.64,1)}
.side:hover .brand-logo{transform:scale(1)}
[data-theme="light"] .brand-logo{filter:invert(1)}
[data-theme="dark"]  .brand-logo{filter:none}
.brand-sub{font-size:11.5px;color:var(--ink-3);letter-spacing:.01em;white-space:nowrap;opacity:0;transition:opacity .22s var(--ease) .14s}
.side:hover .brand-sub{opacity:1;transition:opacity .22s var(--ease) .18s}

/* nav */
.nav{flex:1;overflow-y:auto;overflow-x:hidden;margin:4px 0 0;display:flex;flex-direction:column;gap:2px}
.navitem{
  position:relative;display:flex;align-items:center;width:100%;height:42px;
  border-radius:var(--radius-ctrl);color:var(--ink-2);
  font-size:13.5px;font-weight:450;text-align:left;
  transition:color var(--dur) var(--ease), background-color var(--dur) var(--ease);
}
.navitem .s-ic{color:var(--ink-3);transition:color var(--dur) var(--ease)}
.navitem:hover{color:var(--ink);background:var(--surface-2)}
.navitem:hover .s-ic{color:var(--ink-2)}
/* active state cross-fades in: accent indicator + accent icon, monochrome surface */
.navitem .ind{position:absolute;left:4px;top:50%;width:3px;height:18px;border-radius:99px;background:var(--accent);transform:translateY(-50%) scaleY(.4);opacity:0;transition:opacity var(--dur) var(--ease), transform var(--dur) var(--ease)}
.navitem.active{color:var(--ink);background:var(--surface);box-shadow:var(--shadow-sm);font-weight:550}
.navitem.active .s-ic{color:var(--accent)}
.navitem.active .ind{opacity:1;transform:translateY(-50%) scaleY(1)}

/* owner profile pill (pinned bottom, contained) */
.side-foot{margin-top:8px;padding-top:12px;border-top:1px solid var(--hairline)}
.profile{
  display:flex;align-items:center;width:100%;height:52px;padding:0;
  border:1px solid var(--hairline);border-radius:13px;background:var(--surface);
  box-shadow:var(--shadow-sm);text-align:left;
  transition:border-color var(--dur) var(--ease), box-shadow var(--dur) var(--ease), transform var(--dur) var(--ease);
}
.profile .s-ic{width:46px}      /* rail inner (48px) minus the pill's 1px borders -> avatar centres on the rail like the nav icons */
.profile:hover{border-color:var(--hairline-2);box-shadow:var(--shadow)}
@media (prefers-reduced-motion:no-preference){ .profile:hover{transform:translateY(-1px)} }
.avatar{
  width:32px;height:32px;border-radius:99px;flex:none;display:grid;place-items:center;
  font-size:11.5px;font-weight:600;color:var(--ink-2);letter-spacing:.02em;
  background:var(--surface-2);border:1px solid var(--hairline);
}
.profile .who{display:flex;flex-direction:column;min-width:0;flex:1;opacity:0;transition:opacity var(--dur-fast) var(--ease)}
.side:hover .profile .who{opacity:1}
.profile .who b{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.profile .who span{font-size:11px;color:var(--ink-3);white-space:nowrap}
.profile .chev{color:var(--ink-3);margin-right:12px;opacity:0;transition:opacity var(--dur-fast) var(--ease)}
.side:hover .profile .chev{opacity:1}

/* ===================== PREVIOUS CHATS (blurred picker, detached glass buttons) ===================== */
.chat-back{position:fixed;inset:0;z-index:80;display:none;justify-content:flex-end;background:color-mix(in srgb, var(--bg) 24%, transparent)}
.chat-back.open{display:flex}
body.chat-open .shell,body.chat-open .side{filter:blur(8px)}
.shell,.side{transition:filter var(--dur) var(--ease)}
.chat-wrap{width:340px;max-width:86vw;height:100%;display:flex;flex-direction:column;gap:14px;padding:16px 20px 28px;overflow-y:auto;
  animation:chatPanel .34s var(--ease)}
@keyframes chatPanel{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:none}}
.chat-head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:0 2px}
.chat-wrap h3{font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);margin:0}
.chat-close{width:30px;height:30px;flex:none;display:grid;place-items:center;border-radius:9px;color:var(--ink-3);background:transparent;border:0;transition:color var(--dur) var(--ease), background-color var(--dur) var(--ease)}
.chat-close:hover{color:var(--ink);background:var(--surface-2)}
.chat-grid{display:flex;flex-direction:column;gap:12px}
/* detached liquid-glass button: lens lives in ::before (see glass block), so text never ghosts */
.chat-pill{
  position:relative;isolation:isolate;display:flex;flex-direction:column;gap:5px;
  text-align:left;padding:15px 17px;border-radius:16px;color:var(--ink);
  border:0;background:transparent;
  opacity:0;transform:translateY(-12px);
  animation:chatDrop .42s var(--ease) forwards;animation-delay:var(--cd,0ms);
}
.chat-pill::before{
  content:"";position:absolute;inset:0;z-index:-1;border-radius:inherit;pointer-events:none;
  background-color:var(--glass-btn);
  -webkit-backdrop-filter:blur(10px) saturate(150%);
  backdrop-filter:blur(10px) url(#liquid-glass) saturate(150%);
  box-shadow:var(--glass-stack);
}
.chat-pill b{font-weight:550;font-size:14px}
.chat-pill .cp-when{font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-3)}
.chat-pill .cp-blurb{font-size:12.5px;line-height:1.45;color:var(--ink-2)}
.chat-pill{transition:transform var(--dur) var(--ease)}
@media (prefers-reduced-motion:no-preference){ .chat-pill:hover{transform:translateY(-2px)} }
@media (prefers-reduced-motion:reduce){ .chat-pill{animation:none;opacity:1;transform:none} }
@keyframes chatDrop{to{opacity:1;transform:none}}

/* ============================ SHELL + TOP BAR ============================ */
.shell{margin-left:var(--rail-w);min-height:100vh;display:flex;flex-direction:column}

.topbar{
  position:sticky;top:0;z-index:30;height:var(--topbar-h);flex:none;
  background:transparent;                      /* navbar has no background, only the search pill does */
  display:flex;align-items:center;
}
.topbar-in{position:relative;width:100%;max-width:var(--page-max);margin:0 auto;padding:0 32px;display:flex;align-items:center;justify-content:center}
.search{
  display:flex;align-items:center;gap:10px;height:38px;width:220px;padding:0 10px 0 14px;
  border:1px solid var(--hairline);background:var(--surface);box-shadow:var(--shadow-sm);
  color:var(--ink-3);font-size:13px;text-align:left;
  will-change:width;
  transition:width var(--dur) var(--ease), border-color var(--dur) var(--ease), color var(--dur) var(--ease), box-shadow var(--dur) var(--ease), opacity var(--dur) var(--ease);
}
.search:hover{width:380px;border-color:var(--hairline-2);color:var(--ink-2)}
html.theme-switching *,html.theme-switching *::before,html.theme-switching *::after{transition:none!important}
body.cmd-open .search{opacity:0;pointer-events:none}
.search .ic{color:var(--ink-3)}
.search .lbl{flex:1}
.search kbd{font-size:10.5px;font-weight:600;color:var(--ink-3);padding:3px 6px;border-radius:6px;background:var(--surface-2);border:1px solid var(--hairline)}
.topbar-sp{display:none}
.iconbtn{
  position:absolute;right:32px;top:50%;margin-top:-17px;
  width:34px;height:34px;display:grid;place-items:center;color:var(--ink-2);
  border:1px solid transparent;transition:background-color var(--dur) var(--ease), color var(--dur) var(--ease);
}
.iconbtn:hover{background:var(--surface-2);color:var(--ink)}
.chats-trigger{position:fixed!important;top:10px;right:24px;margin-top:0;z-index:60;width:38px!important;height:38px!important;border-radius:13px!important;color:var(--ink)!important}   /* square glass button, same height as the search pill */
.chats-trigger svg{width:20px;height:20px;stroke-width:2.1}

.view{flex:1;width:100%}
.page{max-width:var(--page-max);margin:0 auto;padding:34px 32px 88px}
.page-head{margin-bottom:26px}
.page-title{font-weight:600;font-size:clamp(1.6rem,2.6vw,2rem);letter-spacing:-.02em;line-height:1.08;margin:6px 0 0;color:var(--ink)}
.page-sub{color:var(--ink-2);font-size:14.5px;margin-top:10px;max-width:62ch}

/* ============================ LAYOUT GRIDS ============================ */
.stack{display:flex;flex-direction:column;gap:20px}
.grid{display:grid;gap:20px}
.grid-2{grid-template-columns:repeat(2,1fr)}
.grid-4{grid-template-columns:repeat(4,1fr)}

/* ============================ SHARED COMPONENTS (render empty by default) ============================ */
.card{background:var(--surface);border:1px solid var(--hairline);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px}
.lift{transition:box-shadow var(--dur) var(--ease), border-color var(--dur) var(--ease)}
@media (prefers-reduced-motion:no-preference){
  .lift{transition:transform var(--dur) var(--ease), box-shadow var(--dur) var(--ease), border-color var(--dur) var(--ease)}
  .lift:hover{transform:translateY(-1px)}                 /* 1px hover lift */
}
.lift:hover{box-shadow:var(--shadow-lift);border-color:var(--hairline-2)}
.card-h{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:16px}
.card-h h3{margin:4px 0 0;font-size:15px;font-weight:600;letter-spacing:-.01em}

.ghost{
  display:inline-flex;align-items:center;gap:7px;padding:8px 13px;border-radius:10px;font-size:12.5px;font-weight:500;
  color:var(--ink-2);border:1px solid var(--hairline);background:transparent;
  transition:background-color var(--dur) var(--ease), color var(--dur) var(--ease), border-color var(--dur) var(--ease), transform var(--dur) var(--ease);
}
.ghost .ic{color:var(--ink-3)}
.ghost:hover{background:var(--surface-2);color:var(--ink);border-color:var(--hairline-2)}
@media (prefers-reduced-motion:no-preference){ .ghost:active{transform:scale(.97)} }

/* KPI */
.kpi{display:flex;flex-direction:column;min-height:150px}
.kpi-val{font-size:clamp(1.9rem,3.2vw,2.4rem);font-weight:600;letter-spacing:-.03em;font-variant-numeric:tabular-nums;line-height:1;margin:16px 0 0;color:var(--ink)}
.kpi-val.empty{color:var(--ink-3)}
.kpi-sub{color:var(--ink-2);font-size:13px;margin-top:10px}
.kpi-foot{margin-top:auto;padding-top:16px}
.delta{display:inline-flex;align-items:center;gap:5px;font-size:12.5px;font-weight:600;color:var(--accent)}

/* Stat */
.stat{display:flex;flex-direction:column;min-height:116px;padding:20px}
.stat-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.stat-top .ic{color:var(--ink-3)}
.stat-val{font-size:1.7rem;font-weight:600;letter-spacing:-.02em;font-variant-numeric:tabular-nums;line-height:1;margin:14px 0 0}
.stat-val.empty{color:var(--ink-3)}
.stat-sub{color:var(--ink-2);font-size:12.5px;margin-top:auto;padding-top:12px}

/* Briefing */
.brief .b-top{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.brief .b-top .ic{color:var(--accent)}
.brief p{margin:0;font-size:15px;line-height:1.6;color:var(--ink);max-width:88ch}
.brief p.empty{color:var(--ink-3)}
.brief .b-actions{display:flex;gap:9px;flex-wrap:wrap;margin-top:16px}

/* Panel */
.rows{display:flex;flex-direction:column}
.row{display:flex;align-items:center;gap:13px;padding:12px 0;border-bottom:1px solid var(--hairline)}
.row:last-child{border-bottom:none}
.row-ava{width:32px;height:32px;flex:none;border-radius:9px;display:grid;place-items:center;font-size:11.5px;font-weight:600;color:var(--ink-2);background:var(--surface-2);border:1px solid var(--hairline)}
.row-main{flex:1;min-width:0}
.row-main b{display:block;font-size:13.5px;font-weight:550;letter-spacing:-.01em}
.row-main span{font-size:12px;color:var(--ink-3)}
.empty-rows{display:flex;flex-direction:column;align-items:center;text-align:center;gap:6px;padding:30px 12px;color:var(--ink-3)}
.empty-rows .ic{color:var(--ink-3)}
.empty-rows b{font-size:13px;font-weight:600;color:var(--ink-2)}
.empty-rows span{font-size:12.5px}

/* Table */
.tbl-wrap{overflow:auto;border-radius:12px;border:1px solid var(--hairline)}
table.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl thead th{text-align:left;font-weight:600;color:var(--ink-3);font-size:11px;letter-spacing:.08em;text-transform:uppercase;padding:11px 16px;border-bottom:1px solid var(--hairline);background:var(--surface-2)}
.tbl tbody td{padding:13px 16px;border-bottom:1px solid var(--hairline);color:var(--ink-2)}
.tbl tbody tr:last-child td{border-bottom:none}
.tbl-empty td{padding:30px 16px;text-align:center;color:var(--ink-3)}

/* Scaffold empty state (used inside auto pages) */
.scaffold-note{display:flex;align-items:center;gap:12px;padding:16px 18px;border:1px dashed var(--hairline-2);border-radius:13px;background:var(--surface-2);color:var(--ink-2);font-size:13px}
.scaffold-note .badge{width:34px;height:34px;flex:none;border-radius:9px;display:grid;place-items:center;color:var(--accent);background:var(--accent-soft)}

/* ============================ HOME (greeting -> ChatGPT-style chat) ============================ */
.chatpage{display:flex;flex-direction:column;height:calc(100vh - var(--topbar-h))}
.chatpage[data-mode="home"]{justify-content:center}                              /* greeting + composer + notes centred */
.chatpage[data-mode="home"] .chatthread{display:none}
.chatpage[data-mode="chat"] .greet,
.chatpage[data-mode="chat"] .notes{display:none}                                 /* chat takes over: greeting + notes gone */

.chatthread{flex:1;min-height:0;overflow-y:auto;width:100%;max-width:var(--home-max);margin:0 auto;padding:28px 24px 12px;display:flex;flex-direction:column;gap:18px}
.composer-bar{flex:none;width:100%;max-width:var(--home-max);margin:0 auto;padding:10px 24px 24px}
.chatpage[data-mode="chat"] .composer-bar{padding-bottom:24px}
.new-chat-btn{display:none;align-items:center;gap:7px;font-size:13px;font-weight:600;color:var(--accent);background:var(--accent-soft);border:1px solid color-mix(in srgb,var(--accent) 30%,transparent);padding:8px 16px;border-radius:10px;margin-bottom:10px;letter-spacing:.01em;transition:background-color var(--dur) var(--ease),color var(--dur) var(--ease),box-shadow var(--dur) var(--ease),border-color var(--dur) var(--ease)}
.new-chat-btn:hover{background:color-mix(in srgb,var(--accent) 18%,transparent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 15%,transparent)}
.new-chat-btn:active{transform:scale(.97)}
.chatpage[data-mode="chat"] .new-chat-btn{display:inline-flex}

/* chat bubbles */
.hmsg{font-size:15.5px;line-height:1.6;white-space:pre-wrap;word-wrap:break-word;animation:fadeUp .32s var(--ease) both}
.hmsg.user{align-self:flex-end;max-width:80%;padding:11px 15px;border-radius:16px;background:color-mix(in srgb, var(--accent) 13%, var(--surface));color:var(--ink)}
.hmsg.bot{align-self:flex-start;max-width:88%;color:var(--ink)}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* first-send transition: notes fade away, composer slides to the bottom (FLIP in JS) */
.fade-away{animation:fadeAway .3s var(--ease) forwards;pointer-events:none}
@keyframes fadeAway{to{opacity:0;transform:translateY(-14px)}}
@media (prefers-reduced-motion:reduce){ .hmsg,.fade-away{animation:none} }

.home-inner{max-width:var(--home-max);margin:0 auto;padding:24px 24px 80px;min-height:calc(100vh - var(--topbar-h));display:flex;flex-direction:column;justify-content:center}

/* greeting: company logo + time of day + name, in serif */
.greet{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;margin-bottom:28px}
.greet-logo{height:26px;width:auto;display:block;opacity:.7}
[data-theme="light"] .greet-logo{filter:invert(1)}      /* white wordmark file -> black on the light canvas */
.greet h1{font-family:var(--font-serif);font-weight:400;font-size:clamp(1.9rem,4.4vw,2.55rem);letter-spacing:-.01em;line-height:1;margin:0;color:var(--ink)}

/* composer (centred) */
.ask{
  width:100%;margin:0;
  background:var(--surface);border:1px solid var(--hairline-2);border-radius:24px;box-shadow:var(--shadow);
  padding:18px 18px 12px;display:flex;flex-direction:column;gap:14px;
  transition:border-color var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
}
.ask:focus-within{border-color:var(--hairline-2);box-shadow:var(--shadow-lift)}
.ask textarea{width:100%;border:none;outline:none;background:none;resize:none;font-size:15.5px;line-height:1.5;color:var(--ink);min-height:28px;max-height:200px;padding:2px 4px}
.ask textarea::placeholder{color:var(--ink-3)}
.ask-foot{display:flex;align-items:center;justify-content:space-between;gap:10px}
.ask-tools{display:flex;align-items:center;gap:4px}
.c-btn{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;color:var(--ink-3);transition:background-color var(--dur) var(--ease), color var(--dur) var(--ease), box-shadow var(--dur) var(--ease)}
.c-btn:hover{background:var(--surface-2);color:var(--ink)}
.c-btn.recording{color:var(--accent);background:var(--accent-soft);box-shadow:0 0 0 2px var(--accent)}
.c-model{display:inline-flex;align-items:center;gap:6px;height:32px;padding:0 9px;border-radius:8px;font-size:13px;font-weight:500;color:var(--ink);transition:background-color var(--dur) var(--ease)}
.c-model:hover{background:var(--surface-2)}
.c-model .lvl{color:var(--ink-3);font-weight:450}
.c-model .ic{color:var(--ink-3)}

/* notification stack, Apple lock-screen style */
.notes-wrap{width:100%;max-width:var(--home-max);margin:26px auto 0}
.notes{position:relative;width:100%;padding:0 24px;scrollbar-width:none}
.notes::-webkit-scrollbar{display:none}
/* expanded: plain scrollable list */
.notes.expanded{overflow-y:auto;max-height:min(58vh,470px);padding-top:4px;padding-bottom:8px}
.notes.expanded .note{margin-bottom:13px}
/* collapsed: pile — front card full-size, older ones peek behind */
.notes.collapsed{overflow:visible;cursor:pointer}
.notes.collapsed .note{position:absolute;left:24px;right:24px;top:0;margin:0}
.notes-toggle{display:block;margin:13px auto 0;padding:7px 16px;font-size:12.5px;font-weight:500;color:var(--ink-3);background:none;border:none;cursor:pointer;font-family:inherit;letter-spacing:-.01em;transition:color var(--dur) var(--ease)}
.notes-toggle:hover{color:var(--ink)}
.note{position:relative;display:flex;gap:13px;align-items:flex-start;padding:15px 18px;border-radius:18px;background:var(--note-bg);border:1px solid var(--hairline);box-shadow:var(--shadow);-webkit-backdrop-filter:blur(20px) saturate(140%);backdrop-filter:blur(20px) saturate(140%);transform-origin:center top;will-change:transform,opacity}
@media (prefers-reduced-motion:no-preference){ .note{transition:transform .48s cubic-bezier(0.34,1.3,0.64,1),opacity .38s var(--ease),height .38s var(--ease)} }
.note-app{width:40px;height:40px;flex:none;border-radius:11px;background:transparent;display:grid;place-items:center;overflow:hidden;border:1px solid var(--hairline-2)}
.note-app svg{width:23px;height:23px}
.note-body{flex:1;min-width:0}
.note-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:2px}
.note-top .app{font-size:12.5px;font-weight:500;color:var(--ink-3)}
.note-top .time{font-size:12px;color:var(--ink-3);white-space:nowrap}
.note-title{margin:0 0 2px;font-size:14.5px;font-weight:600;letter-spacing:-.01em;color:var(--ink)}
.note-msg{margin:0;font-size:13px;line-height:1.4;color:var(--ink-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.notes-empty{display:flex;flex-direction:column;align-items:center;text-align:center;gap:10px;padding:44px 24px;border:1px solid var(--hairline);border-radius:18px;background:var(--note-bg)}
.notes-empty .ne-ic{width:46px;height:46px;border-radius:12px;display:grid;place-items:center;color:var(--ink-3);background:var(--surface-2)}
.notes-empty b{font-size:14px;font-weight:600}
.notes-empty span{font-size:13px;color:var(--ink-3);max-width:36ch}

/* ============================ COMMAND PALETTE (the only glass surface) ============================ */
.pal-back{
  position:fixed;inset:0;z-index:90;display:none;
  background:rgba(20,19,15,0.10);
  padding:10px 18px 18px;justify-content:center;align-items:flex-start;
}
[data-theme="dark"] .pal-back{background:rgba(0,0,0,0.34)}
.pal-back.open{display:flex}
.palette{
  width:100%;max-width:600px;border-radius:20px;overflow:hidden;display:flex;flex-direction:column;max-height:82vh;
  background:color-mix(in srgb, var(--surface) 90%, transparent);
  -webkit-backdrop-filter:blur(26px) saturate(180%);backdrop-filter:blur(26px) url(#liquid-glass) saturate(180%);
  border:1px solid var(--hairline-2);box-shadow:0 26px 64px -26px rgba(20,19,15,0.42);transform-origin:top center;
}
@supports not ((backdrop-filter:blur(1px)) or (-webkit-backdrop-filter:blur(1px))){ .palette{background:var(--surface)} }
@media (prefers-reduced-motion:no-preference){
  .pal-back.open .palette{animation:drop .26s var(--ease)}    /* drops down from the search */
  @keyframes drop{from{opacity:0;transform:translateY(-10px) scale(.98)}to{opacity:1;transform:none}}
}
.pal-search{display:flex;align-items:center;gap:12px;padding:16px 18px;border-bottom:1px solid var(--hairline)}
.pal-search .ic{color:var(--ink-3)}
.pal-search input{flex:1;background:none;border:none;outline:none;font-size:15.5px;color:var(--ink);font-family:inherit}
.pal-search input::placeholder{color:var(--ink-3)}
.pal-search kbd{font-size:10.5px;font-weight:600;color:var(--ink-3);padding:3px 6px;border-radius:6px;background:var(--surface-2);border:1px solid var(--hairline)}
.pal-list{overflow-y:auto;padding:8px}
.pal-list.hide{display:none}
.pal-chat{display:none;flex-direction:column;gap:10px;padding:16px;max-height:48vh;overflow-y:auto}
.pal-chat.show{display:flex}
.msg{max-width:82%;padding:10px 13px;border-radius:14px;font-size:13.5px;line-height:1.5}
.msg.user{align-self:flex-end;background:var(--accent-soft);color:var(--ink)}
.msg.bot{align-self:flex-start;background:var(--surface-2);color:var(--ink-2);border:1px solid var(--hairline)}
@media (prefers-reduced-motion:no-preference){ .msg{animation:msgin .26s var(--ease)} @keyframes msgin{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}} }
.pal-group{font-size:10.5px;font-weight:600;letter-spacing:.13em;text-transform:uppercase;color:var(--ink-3);padding:13px 12px 6px}
.pal-item{display:flex;align-items:center;gap:12px;width:100%;text-align:left;padding:10px 12px;border-radius:12px;color:var(--ink);transition:background-color var(--dur-fast) var(--ease)}
.pal-item .p-ic{width:34px;height:34px;flex:none;border-radius:9px;display:grid;place-items:center;color:var(--ink-2);background:var(--surface);border:1px solid var(--hairline)}
.pal-item.ai .p-ic{color:var(--accent);background:var(--accent-soft);border-color:transparent}
.pal-item .p-main{flex:1;min-width:0}
.pal-item .p-main b{display:block;font-size:14px;font-weight:500}
.pal-item .p-main span{font-size:12px;color:var(--ink-3)}
.pal-item .chev{color:var(--ink-3)}
.pal-item[aria-selected="true"]{background:var(--accent-soft)}
.pal-item[aria-selected="true"] .p-main b{color:var(--accent)}
.pal-empty{padding:28px 16px;text-align:center;color:var(--ink-3);font-size:13.5px}

/* AI ask bar — pinned to palette bottom, always visible */
.pal-ask-bar{display:flex;align-items:center;gap:10px;padding:12px 16px;border-top:1px solid var(--hairline);background:var(--surface-2);border-radius:0 0 20px 20px}
.pal-ask-ic{color:var(--accent);flex:none}
.pal-ask-bar input{flex:1;background:none;border:none;outline:none;font-size:13.5px;color:var(--ink);font-family:inherit}
.pal-ask-bar input::placeholder{color:var(--ink-3)}
.pal-ask-send{width:28px;height:28px;border-radius:8px;display:grid;place-items:center;flex:none;background:var(--accent);color:#fff;transition:opacity var(--dur) var(--ease),transform var(--dur) var(--ease)}
.pal-ask-send:hover{opacity:.85}
@media (prefers-reduced-motion:no-preference){.pal-ask-send:active{transform:scale(.93)}}

/* toast */
.toast{position:fixed;left:50%;bottom:26px;transform:translate(-50%,14px);z-index:120;padding:11px 17px;border-radius:12px;font-size:13.5px;font-weight:500;background:var(--surface);border:1px solid var(--hairline);box-shadow:var(--shadow-lift);opacity:0;pointer-events:none;transition:opacity var(--dur) var(--ease), transform var(--dur) var(--ease)}
.toast.show{opacity:1;transform:translate(-50%,0)}

:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:8px}

/* ============================ RESPONSIVE ============================ */
@media (max-width:1024px){ .grid-4{grid-template-columns:repeat(2,1fr)} }
@media (max-width:760px){
  .topbar-in{padding:0 18px}
  .page{padding:26px 18px 72px}
  .home-inner{padding:0 18px 96px}
  .home-hero{padding-top:clamp(36px,8vh,90px)}
  .notes{margin-top:54px}
  .grid-2{grid-template-columns:1fr}
}
@media (max-width:520px){ .grid-4{grid-template-columns:1fr} .search{max-width:none} }

/* ============================ MOTION: staggered fade-and-rise on mount ============================ */
@media (prefers-reduced-motion:no-preference){
  .rise{opacity:0;animation:rise .5s var(--ease) forwards;animation-delay:calc(var(--d,0) * var(--stagger))}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
}
@media (prefers-reduced-motion:reduce){
  *{animation:none !important}
  .lift:hover,.profile:hover,.ghost:active,.send-btn:active{transform:none !important}
}

/* ============================================================================
   APPLE-STYLE LIQUID GLASS  ·  ported from apple-tahoe-liquid-glass-button.
   Empty ::before "lens" carries the backdrop-filter (so labels never ghost) plus
   the specular inset box-shadow stack. Chrome/Edge refract via url(#liquid-glass);
   Safari/Firefox fall back to the plain blur. Applied to controls, never cards.
   ============================================================================ */
:root{
  --gx:cubic-bezier(1,0,.4,1);
  --grl:1; --grd:1;                          /* glass reflex: light sheen / dark depth */
  --glass-btn:rgba(255,255,255,0.50);
  --glass-stack:
    inset 0 0 0 1px color-mix(in srgb, white calc(var(--grl)*10%), transparent),
    inset 1.8px 3px 0 -2px color-mix(in srgb, white calc(var(--grl)*90%), transparent),
    inset -2px -2px 0 -2px color-mix(in srgb, white calc(var(--grl)*80%), transparent),
    inset -3px -8px 1px -6px color-mix(in srgb, white calc(var(--grl)*60%), transparent),
    inset -0.3px -1px 4px 0 color-mix(in srgb, black calc(var(--grd)*12%), transparent),
    inset -1.5px 2.5px 0 -2px color-mix(in srgb, black calc(var(--grd)*20%), transparent),
    inset 0 3px 4px -2px color-mix(in srgb, black calc(var(--grd)*20%), transparent),
    inset 2px -6.5px 1px -4px color-mix(in srgb, black calc(var(--grd)*10%), transparent),
    0 1px 5px 0 color-mix(in srgb, black calc(var(--grd)*10%), transparent),
    0 6px 16px 0 color-mix(in srgb, black calc(var(--grd)*8%), transparent);
}
[data-theme="dark"]{ --grl:.28; --grd:1.15; --glass-btn:rgba(255,255,255,0.05); }

/* curve every control to a pill / circle */
.search,.ghost,.profile,.iconbtn,.send-btn,.ask .mic,.navitem{border-radius:16px}   /* squared, very curved edges, not pills */

/* lens treatment on the standalone controls */
.search,.iconbtn,.send-btn,.ask .mic,.ghost,.profile{
  position:relative;isolation:isolate;
  border-color:transparent!important;background:transparent!important;box-shadow:none!important;
  transition:transform .4s var(--gx), width var(--dur) var(--ease);
}
.search::before,.iconbtn::before,.send-btn::before,.ask .mic::before,.ghost::before,.profile::before{
  content:"";position:absolute;inset:0;z-index:-1;border-radius:inherit;pointer-events:none;
  background-color:var(--glass-btn);
  -webkit-backdrop-filter:blur(8px) saturate(150%);
  backdrop-filter:blur(8px) url(#liquid-glass) saturate(150%);
  box-shadow:var(--glass-stack);
  transition:background-color .4s var(--gx), box-shadow .4s var(--gx);
}
/* send keeps the single accent, now as tinted glass */
.send-btn::before{ background-color:color-mix(in srgb, var(--accent) 72%, transparent); }

/* nav items: glass lens cross-fades in on hover / active */
.navitem{position:relative;isolation:isolate}
.navitem::before{
  content:"";position:absolute;inset:0;z-index:-1;border-radius:inherit;pointer-events:none;opacity:0;
  background-color:var(--glass-btn);
  -webkit-backdrop-filter:blur(8px) saturate(150%);
  backdrop-filter:blur(8px) url(#liquid-glass) saturate(150%);
  box-shadow:var(--glass-stack);
  transition:opacity .3s var(--gx);
}
.navitem:hover,.navitem.active{background:transparent!important;box-shadow:none!important}
.navitem:hover::before{opacity:.55}        /* hover: faint lens, clearly subordinate to active */
.navitem.active::before{opacity:1}          /* active: full glass pill */
.navitem.active:hover::before{opacity:1}

/* interaction physics: gentle, never bouncy */
@media (hover:hover){
  .iconbtn:hover,.ask .mic:hover,.ghost:hover,.profile:hover,.send-btn:not(:disabled):hover{transform:scale(1.03)}
}
.iconbtn:active,.ask .mic:active,.ghost:active,.profile:active,.send-btn:not(:disabled):active{transform:scale(.96)}

/* solid fallbacks where glass is unsupported or unwanted */
@supports not ((backdrop-filter:blur(1px)) or (-webkit-backdrop-filter:blur(1px))){
  .search::before,.iconbtn::before,.ask .mic::before,.ghost::before,.profile::before,.navitem::before{background-color:var(--surface)}
  .send-btn::before{background-color:var(--accent)}
}
@media (prefers-reduced-transparency:reduce){
  .search::before,.iconbtn::before,.ask .mic::before,.ghost::before,.profile::before,.navitem::before{-webkit-backdrop-filter:none;backdrop-filter:none;background-color:var(--surface)}
  .send-btn::before{-webkit-backdrop-filter:none;backdrop-filter:none;background-color:var(--accent)}
}
@media (prefers-reduced-motion:reduce){
  .search,.iconbtn,.send-btn,.ask .mic,.ghost,.profile{transition:none!important}
  .search:hover,.iconbtn:hover,.send-btn:hover,.ask .mic:hover,.ghost:hover,.profile:hover,
  .search:active,.iconbtn:active,.send-btn:active,.ask .mic:active,.ghost:active,.profile:active{transform:none!important}
}
</style>

function GhostButton(label, { go="", icon:ic="" } = {}){
  return `<button class="ghost" ${go?`data-go="${go}"`:""}>${ic?icon(ic,15):""}${label}</button>`;
}
function PageHeader({ eyebrow, title, sub }){
  return `<div class="page-head rise">

    <h1 class="page-title">${title}</h1>
    ${sub?`<p class="page-sub">${sub}</p>`:""}

}
function KpiCard({ eyebrow="Metric", value, sub, delta } = {}){
  return `<section class="card kpi lift rise">
    <div class="eyebrow">${eyebrow}</div>
    <div class="kpi-val ${value==null?"empty":""}">${value==null?"-":value}</div>
    <div class="kpi-sub">${sub || "Wire a value"}</div>
    ${delta?`<div class="kpi-foot"><span class="delta">${delta}</span></div>`:""}
  </section>`;
}
function StatCard({ eyebrow="Stat", value, sub, icon:ic="layers" } = {}){
  return `<section class="card stat lift rise">
    <div class="stat-top"><div class="eyebrow">${eyebrow}</div>${icon(ic,17)}</div>
    <div class="stat-val ${value==null?"empty":""}">${value==null?"-":value}</div>
    <div class="stat-sub">${sub || "No data yet"}</div>
  </section>`;
}
function BriefingCard({ title="Briefing", body, actions=[] } = {}){
  return `<section class="card brief lift rise">
    <div class="b-top">${icon("spark",17)}<span class="eyebrow">${title}</span></div>
    <p class="${body?"":"empty"}">${body || "Your briefing will appear here once this section is wired to live data."}</p>
    ${actions.length?`<div class="b-actions">${actions.map(a=>GhostButton(a.label,{go:a.go})).join("")}</div>`:""}
  </section>`;
}
function Panel({ title="Panel", eyebrow, rows=[], empty="Nothing here yet" } = {}){
  const body = rows.length
    ? rows.map(r=>`<div class="row"><span class="row-ava">${initials(r.name||"")}</span><div class="row-main"><b>${r.name||""}</b><span>${r.sub||""}</span></div></div>`).join("")
    : `<div class="empty-rows">${icon("inbox",22)}<b>${empty}</b><span>Rows render here once wired.</span></div>`;
  return `<section class="card lift rise">
    <div class="card-h"><div>${eyebrow?`<div class="eyebrow">${eyebrow}</div>`:""}<h3>${title}</h3></div></div>
    <div class="rows">${body}</div>
  </section>`;
}
function Table({ title="Records", columns=["","","",""], rows=[] } = {}){
  const head = `<tr>${columns.map(c=>`<th>${c||"&nbsp;"}</th>`).join("")}</tr>`;
  const body = rows.length
    ? rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join("")}</tr>`).join("")
    : `<tr class="tbl-empty"><td colspan="${columns.length}">No rows yet. Wire a data source to populate this table.</td></tr>`;
  return `<section class="card lift rise">
    <div class="card-h"><h3>${title}</h3></div>
    <div class="tbl-wrap"><table class="tbl"><thead>${head}</thead><tbody>${body}</tbody></table></div>
  </section>`;
}
function initials(name){ return name.split(/\s+/).slice(0,2).map(w=>w[0]||"").join("").toUpperCase() || "-"; }

const chatsBtn = document.getElementById("chatsBtn");
const chatBack = document.getElementById("chatBack");
const chatGrid = document.getElementById("chatGrid");

function renderHistory(){
  if(!CHATS.length){ if(chatsBtn) chatsBtn.style.display="none"; return; }
  chatsBtn.innerHTML = icon("menu",18);
  chatsBtn.addEventListener("click",openChatPicker);
  const xb = document.getElementById("chatClose");
  if(xb){ xb.innerHTML = icon("x",17); xb.addEventListener("click",closeChatPicker); }
  chatGrid.innerHTML = CHATS.map((c,i)=>`
    <button class="chat-pill" data-chat="${c.id}" style="--cd:${i*45}ms">
      <span class="cp-when">${c.when}</span>
      <b>${c.title}</b>
      <span class="cp-blurb">${c.blurb}</span>
    </button>`).join("");
  chatGrid.querySelectorAll(".chat-pill").forEach(b=>b.addEventListener("click",()=>openChat(b.dataset.chat)));
}
function openChatPicker(){
  chatGrid.querySelectorAll(".chat-pill").forEach(p=>{ p.style.animation="none"; void p.offsetWidth; p.style.animation=""; });
  chatBack.classList.add("open"); document.body.classList.add("chat-open");
}
function closeChatPicker(){ chatBack.classList.remove("open"); document.body.classList.remove("chat-open"); }
function openChat(id){
  const c = CHATS.find(x=>x.id===id); if(!c) return;
  closeChatPicker();
  homeMsgs = [{ role:"user", text:c.title }, { role:"bot", text:c.blurb }];  // load the thread into the home chat (stub)
  setPage("overview");
}
chatBack.addEventListener("click",e=>{ if(e.target===chatBack) closeChatPicker(); });

function renderMain(){
  if(currentPage === "overview"){
    main.innerHTML = homeBody();
    wireHome();
  } else {
    const it = navItem(currentPage);
    const body = PAGES[currentPage] ? PAGES[currentPage]() : moduleScaffold(it);
    main.innerHTML = `<div class="page">${PageHeader({ eyebrow:"Module", title:it.label, sub:SUBTITLES[it.id] || "This section is wired in and ready to build." })}${body}</div>`;
  }
  main.querySelectorAll(".rise").forEach((el,i)=>{ if(!el.style.getPropertyValue("--d")) el.style.setProperty("--d", i); });
  main.querySelectorAll("[data-go]").forEach(b=>b.addEventListener("click",()=>{ if(b.dataset.go) setPage(b.dataset.go); }));

}

  setTimeout(()=>{ homeMsgs.push({ role:"bot", text:BOT_STUB }); renderHomeThread(); }, 300);

function sendHome(q){ homeMsgs.push({ role:"user", text:q }); renderHomeThread(); botReply(); }

/* first message: notes fade out, composer slides middle -> bottom (FLIP), thread appears */
function startChat(q){
  const page = document.getElementById("chatpage");
  const bar  = document.getElementById("composerBar");
  const greet= document.getElementById("homeGreet");
  const notes= document.getElementById("homeNotesWrap");
  const reduce = window.matchMedia("(prefers-reduced-motion:reduce)").matches;

  const first = bar.getBoundingClientRect();           // composer position before the switch
  homeMsgs.push({ role:"user", text:q }); renderHomeThread();
  if(greet) greet.classList.add("fade-away");
  if(notes) notes.classList.add("fade-away");
  page.dataset.mode = "chat";                           // layout flips: composer reflows to the bottom

  if(!reduce){
    const last = bar.getBoundingClientRect();
    const dy = first.top - last.top;
    bar.style.transition = "none";
    bar.style.transform  = `translateY(${dy}px)`;
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      bar.style.transition = "transform .52s var(--ease)";
      bar.style.transform  = "";
    }));
    bar.addEventListener("transitionend",()=>{ bar.style.transition=""; },{ once:true });
  }
  setTimeout(()=>{ greet&&greet.remove(); notes&&notes.remove(); }, 320);
  botReply();
}
function wireHome(){
  const form = document.getElementById("askForm"); if(!form) return;
  const ta = document.getElementById("askInput");

  /* new chat: clear thread and return to home greeting */
  const newChatBtn = document.getElementById("newChatBtn");
  if(newChatBtn) newChatBtn.addEventListener("click",()=>{ homeMsgs=[]; renderMain(); });
  form.addEventListener("submit",e=>{ e.preventDefault(); const q=ta.value.trim(); if(!q) return; (homeMsgs.length?sendHome:startChat)(q); ta.value=""; ta.style.height="auto"; });
  ta.addEventListener("input",()=>{ ta.style.height="auto"; ta.style.height=Math.min(ta.scrollHeight,200)+"px"; });
  ta.addEventListener("keydown",e=>{ if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); form.requestSubmit(); }});

  /* attach files */
  const fileInput = document.getElementById("fileInput");
  const plusBtn   = document.getElementById("plusBtn");
  if(plusBtn && fileInput){
    plusBtn.addEventListener("click",()=>fileInput.click());
    fileInput.addEventListener("change",()=>{
      const files=[...fileInput.files];
      if(!files.length) return;
      const names=files.map(f=>f.name).join(", ");
      showToast(files.length===1?`Attached: ${names}`:`Attached ${files.length} files`);
      fileInput.value="";
    });
  }

  /* mic toggle */
  const micBtn = document.getElementById("micBtn");
  let micActive=false;
  if(micBtn){
    micBtn.addEventListener("click",()=>{
      micActive=!micActive;
      micBtn.classList.toggle("recording",micActive);
      showToast(micActive?"Listening…":"Microphone off");
    });
  }

  wireNoteStack();
}

/* Apple lock-screen notification stack: collapsed pile (click to expand/collapse) */
const NOTE_VISIBLE = 3;   // cards visible in pile
const NOTE_PEEK    = 12;  // px each deeper card peeks below the one in front
const NOTE_SCALE   = 0.05;
let notesExpanded = false;

function wireNoteStack(){
  notesExpanded = false;
  const toggle = document.getElementById("notesToggle");
  if(toggle){
    toggle.addEventListener("click", e=>{ e.stopPropagation(); notesExpanded=!notesExpanded; layoutNotes(); });
  }
  const stack = document.getElementById("homeNotes");
  if(stack && !stack.dataset.wired){
    stack.dataset.wired = "1";
    stack.addEventListener("click", ()=>{ if(!notesExpanded){ notesExpanded=true; layoutNotes(); } });
  }
  layoutNotes();
}

function layoutNotes(){
  const stack = document.getElementById("homeNotes");
  if(!stack) return;
  const cards = [...stack.querySelectorAll(".note")];
  if(!cards.length) return;

  const collapsible = cards.length > NOTE_VISIBLE;
  const collapsed   = collapsible && !notesExpanded;

  stack.classList.toggle("collapsed", collapsed);
  stack.classList.toggle("expanded",  !collapsed);

  const toggle = document.getElementById("notesToggle");
  if(toggle){
    toggle.style.display  = collapsible ? "" : "none";
    toggle.textContent    = notesExpanded ? "Show less" : `Show all ${cards.length}`;
  }

  if(collapsed){
    cards.forEach((c,i)=>{
      const d       = Math.min(i, NOTE_VISIBLE - 1);
      const hidden  = i >= NOTE_VISIBLE;
      c.style.transform    = `translateY(${d * NOTE_PEEK}px) scale(${1 - d * NOTE_SCALE})`;
      c.style.opacity      = hidden ? "0" : String(1 - d * 0.14);
      c.style.zIndex       = String(cards.length - i);
      c.style.pointerEvents = hidden ? "none" : "";
    });
    const h0 = cards[0].getBoundingClientRect().height;
    stack.style.height = (h0 + (NOTE_VISIBLE - 1) * NOTE_PEEK + 4) + "px";
  } else {
    cards.forEach(c=>{ c.style.transform=""; c.style.opacity=""; c.style.zIndex=""; c.style.pointerEvents=""; });
    stack.style.height = "";
  }
}
window.addEventListener("resize", ()=>{ try{ layoutNotes(); }catch(e){} });

function setPage(id){
  if(!navItem(id)) return;
  if(id === "overview") homeMsgs = [];
  currentPage = id;

/* ---- theme ---- */
function applyBrandAccent(){
  const dark = document.documentElement.getAttribute("data-theme")==="dark";
  const a = dark ? (brand.accentDark||brand.accent) : brand.accent;
  document.documentElement.style.setProperty("--accent", a);
  document.documentElement.style.setProperty("--accent-soft", hexToRgba(a, dark?0.14:0.10));
}
function setTheme(mode){
  const root = document.documentElement;
  root.classList.add("theme-switching");          // freeze all transitions so every element flips at once
  root.setAttribute("data-theme", mode);
  try{ localStorage.setItem("cc-theme", mode); }catch(e){}
  applyBrandAccent(); syncThemeBtn();
  void root.offsetWidth;                            // force reflow so the no-transition paint commits
  requestAnimationFrame(()=>requestAnimationFrame(()=>root.classList.remove("theme-switching")));
}
function toggleTheme(){ setTheme(document.documentElement.getAttribute("data-theme")==="dark"?"light":"dark"); }
function syncThemeBtn(){
  const b = document.getElementById("themeBtn"); if(!b) return;
  const dark = document.documentElement.getAttribute("data-theme")==="dark";
  const i = b.querySelector(".t-ic"), l = b.querySelector(".t-lbl");
  if(i) i.innerHTML = icon(dark?"sun":"moon",18);
  if(l) l.textContent = dark?"Light mode":"Dark mode";
  b.setAttribute("aria-label", dark?"Switch to light mode":"Switch to dark mode");
}
function hexToRgba(hex,a){ const h=hex.replace("#",""); const n=parseInt(h.length===3?h.split("").map(c=>c+c).join(""):h,16); return `rgba(${(n>>16)&255}, ${(n>>8)&255}, ${n&255}, ${a})`; }

/* ============================ COMMAND PALETTE ============================ */
const palBack = document.getElementById("palBack");
const palInput = document.getElementById("palInput");
const palList = document.getElementById("palList");
const palChat = document.getElementById("palChat");
let palItems = [], palActive = 0, palMode = "cmd", chatMsgs = [];

function resetPalette(){ palMode="cmd"; chatMsgs=[]; palChat.classList.remove("show"); palChat.innerHTML=""; palList.classList.remove("hide"); palInput.value=""; palInput.placeholder="Search, jump to a section, or ask anything"; }
function openPalette(){ document.body.classList.add("cmd-open"); palBack.classList.add("open"); resetPalette(); buildPalette(""); setTimeout(()=>palInput.focus(),20); }
function closePalette(){ palBack.classList.remove("open"); document.body.classList.remove("cmd-open"); resetPalette(); }
/* AI chat thread inside the launcher, opened from the search or the home composer */
function renderChat(){ palChat.innerHTML = chatMsgs.map(m=>`<div class="msg ${m.role==="user"?"user":"bot"}">${escapeHtml(m.text)}</div>`).join(""); palChat.scrollTop = palChat.scrollHeight; }
function enterChat(q){
  q=(q||"").trim(); if(!q) return;
  palMode="chat"; palList.classList.add("hide"); palChat.classList.add("show");
  palInput.placeholder="Reply to keep the thread going";
  chatMsgs.push({ role:"user", text:q }); renderChat(); palInput.value="";
  // STUB reply. Wire askAI() to a server route (see the Ask AI comment) and replace this line with the real answer.
  setTimeout(()=>{ chatMsgs.push({ role:"bot", text:"Ask AI is not wired yet. Connect a server route at /api/ask to answer from your business data, see the code comment below." }); renderChat(); }, 260);
}
function isPaletteOpen(){ return palBack.classList.contains("open"); }

function buildPalette(q){
  const query = q.trim(), lc = query.toLowerCase(), match = s => s.toLowerCase().includes(lc);
  palItems = []; let html = "";
  if(query){
    palItems.push({ type:"ai", query });
    html += `<button class="pal-item ai" data-i="${palItems.length-1}"><span class="p-ic">${icon("spark",18)}</span><div class="p-main"><b>Ask AI: ${escapeHtml(query)}</b><span>Answer grounded in your business data</span></div>${icon("arrowup",16)}</button>`;
  }
  const sug = SUGGESTED.filter(s=>!query||match(s.label));
  if(sug.length){
    html += `<div class="pal-group">Suggested</div>`;
    html += sug.map(s=>{ palItems.push({type:"page",target:s.target}); return `<button class="pal-item" data-i="${palItems.length-1}"><span class="p-ic">${icon("search",18)}</span><div class="p-main"><b>${s.label}</b></div><span class="chev">${icon("chevron",16)}</span></button>`; }).join("");
  }
  const sc = SHORTCUTS.filter(s=>!query||match(s.label));
  if(sc.length){
    html += `<div class="pal-group">Shortcuts</div>`;
    html += sc.map(s=>{ palItems.push({type:"shortcut",run:s.run}); return `<button class="pal-item" data-i="${palItems.length-1}"><span class="p-ic">${icon("plus",18)}</span><div class="p-main"><b>${s.label}</b></div>${s.hint?`<kbd>${s.hint}</kbd>`:""}</button>`; }).join("");
  }
  const pages = NAV.filter(it=>!query||match(it.label));
  if(pages.length){
    html += `<div class="pal-group">Pages</div>`;
    html += pages.map(it=>{ palItems.push({type:"page",target:it.id}); return `<button class="pal-item" data-i="${palItems.length-1}"><span class="p-ic">${icon(it.icon,18)}</span><div class="p-main"><b>${it.label}</b><span>${SUBTITLES[it.id]||"Open section"}</span></div><span class="chev">${icon("chevron",16)}</span></button>`; }).join("");
  }
  if(!palItems.length) html = `<div class="pal-empty">No matches for "${escapeHtml(query)}"</div>`;
  palList.innerHTML = html; palActive = 0; highlight();
  palList.querySelectorAll("[data-i]").forEach(el=>{
    el.addEventListener("click",()=>runPalItem(+el.dataset.i));
    el.addEventListener("mousemove",()=>{ palActive=+el.dataset.i; highlight(); });
  });
}
function highlight(){
  palList.querySelectorAll("[data-i]").forEach(el=>el.setAttribute("aria-selected",(+el.dataset.i===palActive)?"true":"false"));
  const a = palList.querySelector('[aria-selected="true"]'); if(a) a.scrollIntoView({block:"nearest"});
}
function runPalItem(i){
  const it = palItems[i]; if(!it) return;
  if(it.type==="ai"){ enterChat(it.query); return; }
  if(it.type==="page") setPage(it.target);
  else if(it.type==="shortcut") it.run();
  closePalette();
}

function escapeHtml(s){ return s.replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

/* ============================ TOAST + HELPERS ============================ */
const toast = document.getElementById("toast"); let toastTimer;
function showToast(msg){ toast.textContent=msg; toast.classList.add("show"); clearTimeout(toastTimer); toastTimer=setTimeout(()=>toast.classList.remove("show"),2600); }

/* ============================ WIRING ============================ */
document.querySelector(".pal-ic").innerHTML = icon("search",18);
document.querySelector("#searchBtn .s-ico").innerHTML = icon("search",16);
document.getElementById("searchBtn").addEventListener("click",openPalette);
palBack.addEventListener("click",e=>{ if(e.target===palBack) closePalette(); });
palInput.addEventListener("input",e=>{ if(palMode==="cmd") buildPalette(e.target.value); });
document.addEventListener("keydown",e=>{
  if((e.metaKey||e.ctrlKey) && e.key.toLowerCase()==="k"){ e.preventDefault(); isPaletteOpen()?closePalette():openPalette(); return; }
  if(e.key==="Escape" && chatBack.classList.contains("open")){ e.preventDefault(); closeChatPicker(); return; }
  if(!isPaletteOpen()) return;
  if(e.key==="Escape"){ e.preventDefault(); closePalette(); }
  else if(e.key==="ArrowDown" && palMode==="cmd"){ e.preventDefault(); palActive=Math.min(palActive+1,palItems.length-1); highlight(); }
  else if(e.key==="ArrowUp" && palMode==="cmd"){ e.preventDefault(); palActive=Math.max(palActive-1,0); highlight(); }
  else if(e.key==="Enter"){ e.preventDefault(); if(palMode==="chat") enterChat(palInput.value); else runPalItem(palActive); }
});
